name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api:
    name: Build .NET API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore -c Release

  reporter:
    name: Build reporter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet build src/Reporter/Ccusage.Reporter.csproj -c Release

  test:
    name: Test .NET API
    runs-on: ubuntu-latest
    # ubuntu-latest ships a running Docker daemon, which Testcontainers uses to
    # spin up a throwaway PostgreSQL for the integration tests.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Run unit + integration tests
        run: dotnet test tests/Ccusage.Api.Tests/Ccusage.Api.Tests.csproj -c Release --logger "console;verbosity=normal"

  web:
    name: Build Angular app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/Web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: src/Web/package-lock.json
      - run: npm ci
      - run: npm run build
