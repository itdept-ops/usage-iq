# ccusage-dashboard — local stack
#
#   Dev (default):   docker compose up -d db      # just Postgres; run API + Angular on the host
#   Full stack:      docker compose --profile full up --build
#
services:
  db:
    image: postgres:16-alpine
    container_name: ccusage-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ccusage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ccusage_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-ccusage}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - ccusage_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ccusage} -d ${POSTGRES_DB:-ccusage}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    profiles: ["full"]
    build:
      # Context is ./src so the build can see the shared Ccusage.Ingestion project the API references.
      context: ./src
      dockerfile: Api/Dockerfile
    container_name: ccusage-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: "Host=db;Port=5432;Database=${POSTGRES_DB:-ccusage};Username=${POSTGRES_USER:-ccusage};Password=${POSTGRES_PASSWORD:-ccusage_dev_pw}"
      Ingestion__ClaudeProjectsPath: "/data/claude"
      Ingestion__CodexPath: "/data/codex"
      Ingestion__DisplayTimeZone: "${Ingestion__DisplayTimeZone:-America/New_York}"
      Cors__AllowedOrigin: "http://localhost:${WEB_PORT:-4200}"
      ASPNETCORE_URLS: "http://+:8080"
    ports:
      - "${API_PORT:-5180}:8080"
    volumes:
      # Read-only mounts of your local agent logs so the containerized API can ingest them.
      - "${CLAUDE_PROJECTS_PATH:-${HOME}/.claude/projects}:/data/claude:ro"
      - "${CODEX_PATH:-${HOME}/.codex}:/data/codex:ro"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    profiles: ["full"]
    build:
      context: ./src/Web
    container_name: ccusage-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-4200}:80"

volumes:
  ccusage_pgdata:
