# Production override — used on the EC2 box:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile full up -d --build
#
# Adds a Caddy reverse proxy with automatic HTTPS (Let's Encrypt) in front of the web
# container, and feeds the API its secrets from the server .env (the git-ignored
# appsettings.Local.json is NOT on the server, so config comes from environment variables).
services:
  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Google__ClientId: "${GOOGLE_CLIENT_ID}"
      Google__ClientSecret: "${GOOGLE_CLIENT_SECRET}"
      Jwt__Key: "${JWT_KEY}"
      Auth__AdminEmails__0: "${ADMIN_EMAIL}"
      Auth__AllowedEmails__0: "${ALLOWED_EMAIL}"
      Cors__AllowedOrigin: "${APP_ORIGIN}"

  caddy:
    image: caddy:2-alpine
    container_name: usage-iq-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: "${DOMAIN}"
      ACME_EMAIL: "${ACME_EMAIL}"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
