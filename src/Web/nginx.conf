server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- Hardening: defensive response headers (applied to every response) ----
    # Clickjacking + MIME-sniffing + referrer leakage protections. These are safe for the
    # Google Identity flow: X-Frame-Options governs who may frame *us*, not iframes we embed.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm font/woff2;

    # Proxy API calls to the api service on the compose network.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade so the SignalR chat hub (/api/hubs/chat) can use a real WS transport
        # rather than falling back to long-polling. Harmless for ordinary HTTP API calls.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Sync can take a while on the first ingest; also keeps idle WS connections alive.
        proxy_read_timeout 600s;
    }

    # Long-cache fingerprinted build assets (Angular emits content-hashed file names).
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback. index.html itself must never be cached, so a deploy is picked up immediately.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }
}
