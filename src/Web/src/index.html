<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Usage IQ</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0b0f14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Usage IQ" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async></script>
    <!-- No-flash theme bootstrap: applied synchronously BEFORE the Angular bundle paints, so the very
         first frame already carries the saved theme (no dark→light flash on a light-theme reload). Reads
         the persisted mode from localStorage ('system' | 'light' | 'dark'; default 'system'), resolves
         'system' via matchMedia, and sets <html data-theme="light|dark">. ThemeService (Angular) takes
         over runtime changes + the live matchMedia listener once it boots — this is only the cold-start. -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem('uiq.theme') || 'system';
          var dark =
            mode === 'dark' ||
            (mode === 'system' &&
              !(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches));
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
