    <!-- Web fonts (Inter, JetBrains Mono, Material Icons) are self-hosted in /fonts, declared via
         @font-face in styles.scss, and service-worker prefetched — so they render OFFLINE with no
         third-party CDN call. Preloaded (same-origin, crossorigin per font CORS) so the first paint
         already carries the real type + <mat-icon> glyphs instead of a fallback flash. -->
    <link rel="preload" href="/fonts/inter.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/jetbrains-mono.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/material-icons.woff2" as="font" type="font/woff2" crossorigin />
    <script src="https://accounts.google.com/gsi/client" async></script>
    <!-- No-flash theme bootstrap: applied synchronously BEFORE the Angular bundle paints, so the very
         first frame already carries the saved theme (no dark→light flash on a light-theme reload). Reads
         the persisted mode from localStorage ('system' | 'light' | 'dark'; default 'system'), resolves
         'system' via matchMedia, and sets <html data-theme="light|dark">. ThemeService (Angular) takes
         over runtime changes + the live matchMedia listener once it boots — this is only the cold-start. -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem('uiq.theme') || 'system';
          var dark =
            mode === 'dark' ||
            (mode === 'system' &&
              !(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches));
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>

    <!-- PWA self-heal watchdog. If the app hasn't rendered after a grace period — e.g. a stale/broken
         cached service-worker shell whose hashed JS no longer resolves, leaving a BLANK page (common on
         installed mobile PWAs after a deploy + cache eviction) — unregister the service worker(s), drop
         the caches, and hard-reload ONCE to pull a fresh shell from the network. A per-session flag stops
         it ever looping; a normally-booting app populates <app-root> long before the timer fires. -->
    <script>
      (function () {
        setTimeout(function () {
          try {
            var root = document.querySelector('app-root');
            var booted = root && (root.children.length > 0 || (root.textContent || '').trim().length > 0);
            if (booted) return;
            if (sessionStorage.getItem('uiq.bootRecovered') === '1') return; // already tried this session
            sessionStorage.setItem('uiq.bootRecovered', '1');
          } catch (e) { return; }
          var reload = function () { location.reload(); };
          var clearCaches = function () {
            if (!self.caches) return Promise.resolve();
            return caches.keys().then(function (ks) {
              return Promise.all(ks.map(function (k) { return caches.delete(k); }));
            });
          };
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations()
              .then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); })
              .catch(function () {})
              .then(clearCaches).catch(function () {})
              .then(reload, reload);
          } else {
            clearCaches().then(reload, reload);
          }
        }, 15000);
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
