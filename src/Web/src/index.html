<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Usage IQ</title>
    <base href="/" />
    <!-- viewport-fit=cover is REQUIRED for env(safe-area-inset-*) to resolve to real values in an
         installed iOS PWA: with apple-mobile-web-app-status-bar-style=black-translucent the web view goes
         edge-to-edge under the notch / Dynamic Island + home indicator, and WITHOUT this flag those insets
         stay 0 — so the top bar, bottom tab bar and sheets render under the system UI. This one flag
         activates all the env(safe-area-inset-*) padding the shell already uses. -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- SEO + social cards. Positioning: "The Agentic Life OS — the operating system for your life." -->
    <meta
      name="description"
      content="Usage IQ is the Agentic Life OS — the operating system for your life. Track, plan, and run everything in one AI-powered place."
    />
    <link rel="canonical" href="https://usageiq.online/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Usage IQ" />
    <meta property="og:title" content="Usage IQ — The operating system for your life" />
    <meta
      property="og:description"
      content="The Agentic Life OS — the operating system for your life. Track, plan, and run everything in one AI-powered place."
    />
    <meta property="og:url" content="https://usageiq.online/" />
    <meta property="og:image" content="https://usageiq.online/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Usage IQ — The operating system for your life" />
    <meta
      name="twitter:description"
      content="The Agentic Life OS — the operating system for your life. Track, plan, and run everything in one AI-powered place."
    />
    <meta name="twitter:image" content="https://usageiq.online/og-image.png" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#0b0f14" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Usage IQ" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <!-- Web fonts (Inter, JetBrains Mono, Material Icons) are self-hosted in /fonts, declared via
         @font-face in styles.scss, and service-worker prefetched — so they render OFFLINE with no
         third-party CDN call. Preloaded (same-origin, crossorigin per font CORS) so the first paint
         already carries the real type + <mat-icon> glyphs instead of a fallback flash. -->
    <link rel="preload" href="/fonts/inter.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/jetbrains-mono.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/material-icons.woff2" as="font" type="font/woff2" crossorigin />
    <!-- Google Identity Services (accounts.google.com/gsi/client) is NOT loaded here — it would download on
         every route. It's injected on demand by core/gis-loader.ts (ensureGis) only on the surfaces that
         use Google sign-in / OAuth: /signin and the family calendar's "connect Google Calendar" flow. -->
    <!-- No-flash theme bootstrap: applied synchronously BEFORE the Angular bundle paints, so the very
         first frame already carries the saved theme (no dark→light flash on a light-theme reload). Reads
         the persisted mode from localStorage ('system' | 'light' | 'dark'; default 'system'), resolves
         'system' via matchMedia, and sets <html data-theme="light|dark">. ThemeService (Angular) takes
         over runtime changes + the live matchMedia listener once it boots — this is only the cold-start. -->
    <script>
      (function () {
        try {
          var mode = localStorage.getItem('uiq.theme') || 'system';
          var dark =
            mode === 'dark' ||
            (mode === 'system' &&
              !(window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches));
          document.documentElement.dataset.theme = dark ? 'dark' : 'light';
          // FiMobile color scheme (accent axis) — 'default' (blue) carries no attribute.
          var scheme = localStorage.getItem('uiq.scheme') || 'default';
          var ok = { indigo: 1, purple: 1, pink: 1, red: 1, orange: 1, yellow: 1, green: 1, teal: 1, cyan: 1 };
          if (ok[scheme]) document.documentElement.dataset.scheme = scheme;
          else delete document.documentElement.dataset.scheme;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>

    <!-- PWA self-heal watchdog. If the app hasn't rendered after a grace period — e.g. a stale/broken
         cached service-worker shell whose hashed JS no longer resolves, leaving a BLANK page (common on
         installed mobile PWAs after a deploy + cache eviction) — unregister the service worker(s), drop
         the caches, and hard-reload ONCE to pull a fresh shell from the network. A per-session flag stops
         it ever looping; a normally-booting app populates <app-root> long before the timer fires. -->
    <script>
      (function () {
        setTimeout(function () {
          try {
            var root = document.querySelector('app-root');
            var booted = root && (root.children.length > 0 || (root.textContent || '').trim().length > 0);
            if (booted) return;
            if (sessionStorage.getItem('uiq.bootRecovered') === '1') return; // already tried this session
            sessionStorage.setItem('uiq.bootRecovered', '1');
          } catch (e) { return; }
          var reload = function () { location.reload(); };
          var clearCaches = function () {
            if (!self.caches) return Promise.resolve();
            return caches.keys().then(function (ks) {
              return Promise.all(ks.map(function (k) { return caches.delete(k); }));
            });
          };
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations()
              .then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); })
              .catch(function () {})
              .then(clearCaches).catch(function () {})
              .then(reload, reload);
          } else {
            clearCaches().then(reload, reload);
          }
        }, 15000);
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
