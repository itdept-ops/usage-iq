<mat-toolbar class="topbar glass">
  <a class="brand" routerLink="/" aria-label="Usage IQ home">
    <svg class="brand__logo" width="24" height="24" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <defs>
        <linearGradient id="uiq-logo-grad" x1="3" y1="29" x2="29" y2="3" gradientUnits="userSpaceOnUse">
          <stop stop-color="#3D8BFF" /><stop offset="0.52" stop-color="#8B7CFF" /><stop offset="1" stop-color="#3FD8D0" />
        </linearGradient>
      </defs>
      <rect x="1.25" y="1.25" width="29.5" height="29.5" rx="7.5" fill="#0B1019" stroke="url(#uiq-logo-grad)" stroke-width="1.5" />
      <rect x="7" y="18" width="3.6" height="7" rx="1.3" fill="url(#uiq-logo-grad)" />
      <rect x="14.2" y="13" width="3.6" height="12" rx="1.3" fill="url(#uiq-logo-grad)" />
      <rect x="21.4" y="8" width="3.6" height="17" rx="1.3" fill="url(#uiq-logo-grad)" />
      <path d="M8.8 15.5 L16 11 L23.2 6.4" stroke="#E6EDF6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.92" />
      <circle cx="23.2" cy="6.4" r="2" fill="#3FD8D0" />
    </svg>
    <span class="brand__word">Usage&nbsp;IQ</span>
    <span class="brand__prompt">~/token-usage&nbsp;$<i class="caret" aria-hidden="true"></i></span>
  </a>

  @if (auth.isAuthenticated()) {
    <nav class="nav" aria-label="Primary">
      <a mat-button class="nav__item" routerLink="/" routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: true }">Dashboard</a>
      <a mat-button class="nav__item" routerLink="/calendar" routerLinkActive="active">Calendar</a>
      <a mat-button class="nav__item" routerLink="/pricing" routerLinkActive="active">Pricing</a>
      <a mat-button class="nav__item" routerLink="/settings" routerLinkActive="active">Settings</a>
      @if (auth.hasPermission('users.manage')) {
        <a mat-button class="nav__item" routerLink="/users" routerLinkActive="active">Users</a>
        <a mat-button class="nav__item" routerLink="/activity" routerLinkActive="active">Activity</a>
      }
    </nav>
  }

  <span class="spacer"></span>

  @if (auth.isAuthenticated()) {
    <span class="status" [attr.data-state]="state()" [matTooltip]="tooltip()" matTooltipClass="axon-tip"
          aria-label="Sync status">
      <span class="status__dot" aria-hidden="true"></span>
      <span class="status__text mono-num">{{ label() }}</span>
    </span>
  }

  <a mat-icon-button class="gh" href="https://github.com/itdept-ops/usage-iq" target="_blank" rel="noopener"
     matTooltip="View on GitHub" aria-label="GitHub repository">
    <mat-icon>code</mat-icon>
  </a>

  @if (auth.isAuthenticated() && auth.session(); as u) {
    <button mat-button class="user" [matMenuTriggerFor]="userMenu" aria-label="Account menu">
      @if (u.picture) {
        <img class="user__avatar" [src]="u.picture" alt="" referrerpolicy="no-referrer" />
      } @else {
        <span class="user__avatar user__avatar--init">{{ initials() }}</span>
      }
      <span class="user__name">{{ u.name }}</span>
      <mat-icon class="user__chev">expand_more</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu" xPosition="before">
      <div class="user-menu-head">
        <div class="user-menu-name">{{ u.name }}</div>
        <div class="user-menu-email">{{ u.email }}</div>
      </div>
      <button mat-menu-item (click)="logout()"><mat-icon>logout</mat-icon> Sign out</button>
    </mat-menu>
  }
</mat-toolbar>

<main class="content">
  <router-outlet />
</main>
