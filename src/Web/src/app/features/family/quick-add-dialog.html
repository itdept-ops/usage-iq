<h2 mat-dialog-title class="qadd__title">
  <mat-icon aria-hidden="true">bolt</mat-icon>
  Quick add
  <button mat-icon-button mat-dialog-close type="button" class="dlg-close" aria-label="Close">
    <mat-icon aria-hidden="true">close</mat-icon>
  </button>
</h2>

<mat-dialog-content class="qadd__body">
  <mat-form-field appearance="outline" class="qadd__field">
    <mat-label>What's on your mind?</mat-label>
    <input matInput maxlength="1000" cdkFocusInitial
           placeholder="e.g. milk · remind me to call the dentist tomorrow 9am · note: wifi code"
           [ngModel]="text()" (ngModelChange)="text.set($event)" (keydown.enter)="save()" />
    <mat-hint>Auto figures out a list item, reminder, or note — or pick one below.</mat-hint>
  </mat-form-field>

  <mat-button-toggle-group class="qadd__kinds" aria-label="What to create"
                           [ngModel]="kind()" (ngModelChange)="kind.set($event)">
    @for (k of kinds; track k.value) {
      <mat-button-toggle [value]="k.value">
        <mat-icon aria-hidden="true">{{ k.icon }}</mat-icon>
        <span class="qadd__kind-label">{{ k.label }}</span>
      </mat-button-toggle>
    }
  </mat-button-toggle-group>

  @if (showListName()) {
    <mat-form-field appearance="outline" class="qadd__field">
      <mat-label>List name (optional)</mat-label>
      <input matInput maxlength="200" placeholder="Quick Capture"
             [ngModel]="listName()" (ngModelChange)="listName.set($event)" (keydown.enter)="save()" />
      <mat-hint>Leave blank to use your “Quick Capture” list.</mat-hint>
    </mat-form-field>
  }

  @if (error()) {
    <p class="qadd__error" role="alert">{{ error() }}</p>
  }
</mat-dialog-content>

<mat-dialog-actions align="end" class="qadd__actions">
  <button mat-stroked-button type="button" (click)="ref.close()">Cancel</button>
  <button mat-flat-button color="primary" type="button" [disabled]="!canSave()" (click)="save()">
    @if (saving()) {
      <mat-spinner diameter="18" class="qadd__spinner" aria-hidden="true" />
      <span>Saving…</span>
    } @else {
      <span>Save</span>
    }
  </button>
</mat-dialog-actions>
