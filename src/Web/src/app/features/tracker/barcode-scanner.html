<div class="scan">
  <div class="scan__viewport" [class.scan--live]="scanning()">
    <video #video class="scan__video" muted playsinline aria-label="Camera preview"></video>
    @if (scanning()) {
      <div class="scan__reticle" aria-hidden="true"></div>
      <span class="scan__hint" aria-live="polite">
        Point the camera at a barcode{{ engine() === 'zxing' ? ' (fallback decoder)' : '' }}…
      </span>
    } @else {
      <div class="scan__idle">
        <mat-icon aria-hidden="true">qr_code_scanner</mat-icon>
        <span>Scan a product barcode</span>
      </div>
    }
  </div>

  <div class="scan__controls">
    @if (!scanning()) {
      <button mat-flat-button type="button" color="primary" class="scan__btn"
              [disabled]="starting() || !cameraSupported"
              (click)="start()">
        <mat-icon>photo_camera</mat-icon>
        {{ starting() ? 'Opening camera…' : 'Start camera' }}
      </button>
    } @else {
      <button mat-stroked-button type="button" class="scan__btn" (click)="stop()">
        <mat-icon>stop</mat-icon> Stop
      </button>
    }
  </div>

  @if (error(); as err) {
    <p class="scan__error" role="alert">
      <mat-icon aria-hidden="true">error_outline</mat-icon> {{ err }}
    </p>
  }

  <div class="scan__manual">
    <mat-form-field appearance="outline" class="scan__manual-field">
      <mat-label>Or enter UPC / EAN manually</mat-label>
      <input matInput inputmode="numeric" autocomplete="off"
             [ngModel]="manualCode()" (ngModelChange)="manualCode.set($event)"
             (keydown.enter)="submitManual()" placeholder="e.g. 0123456789012" />
    </mat-form-field>
    <button mat-stroked-button type="button" class="scan__lookup"
            [disabled]="!manualValid()" (click)="submitManual()">
      <mat-icon>search</mat-icon> Look up
    </button>
  </div>
</div>
